# https://docs.github.com/en/pages/setting-up-a-github-pages-site-with-jekyll/creating-a-github-pages-site-with-jekyll?platform=linux
# https://pages.github.com/versions/

site: PROTEUS Framework
domain: formingworlds.github.io

title: PROTEUS Framework
description: "Open-source framework for simulating the coupled interior-atmosphere evolution of rocky planets, from magma oceans to habitable worlds."
lang: en

author: Tim Lichtenberg

url: https://proteus-framework.org
baseurl:

# Social / SEO (used by jekyll-seo-tag)
logo: /assets/img/brand/PROTEUS_white_on_black.png
social:
  name: PROTEUS Framework
  links:
    - https://github.com/FormingWorlds/PROTEUS
twitter:
  card: summary_large_image

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /papers/:slug
    type: "post"

defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
      image: /assets/img/og-default.jpg
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

sass:
  sass_dir: assets/styles
  style: compressed
  sourcemap: never

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-github-metadata

paginate: 6
paginate_path: "/page:num/"

github: [metadata]

repository: FormingWorlds/FormingWorlds.github.io

