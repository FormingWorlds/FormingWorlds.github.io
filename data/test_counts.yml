# Test count and badge data for the /validation page.
#
# Each entry describes one module in either the "mature" or "in_development"
# group. The coverage-badge workflow reads this file to publish the coverage
# badge endpoints that the /validation page displays.
#
# Per-row fields:
#   name           Display name
#   owner          GitHub owner
#   repo           GitHub repo
#   workflow       Filename of the primary test workflow (for the CI badge)
#   ci_label       Text shown on the CI badge ("CI" or "tests")
#   has_codecov    Whether to render a coverage badge. The figure is read from a
#                    `coverage-<repo>.json` endpoint on this site's own `badges`
#                    branch, refreshed daily by the coverage workflow; the module
#                    must be on Codecov for the figure to populate. After adding a
#                    module, run the "Refresh coverage badges" workflow once so
#                    the endpoint exists before the badge renders.
#   total          Static total test count (text or number). Shown when no
#                    `total_endpoint` is provided.
#   total_endpoint Optional. Path of the shields.io-compatible JSON file,
#                    relative to `badge_branch` (e.g. "tests-total.json" at the
#                    root of a badges branch, or ".github/badges/tests-total.json"
#                    on main), or a full https URL to the JSON (e.g. a gist raw
#                    endpoint that the module's CI publishes). When set, the row
#                    renders a live shields.io endpoint badge instead of the
#                    static `total`.
#   badge_branch   Optional. Branch that holds the badge JSON files. Defaults
#                    to "main". Repos with a protected main publish the JSON to
#                    a dedicated "badges" branch instead; set this to that
#                    branch name so the endpoint URLs resolve. Applies to
#                    `total_endpoint` and `markers` only. The CI badge always
#                    tracks main; the coverage badge is read from this site's own
#                    `badges` branch (see `has_codecov`).
#   breakdown      Optional. Plain-text marker breakdown ("816 unit, ...").
#                    Used until per-marker endpoint files are published.
#   markers        Optional. Map of marker name to JSON path (relative to
#                    `badge_branch`) or full https URL; when set, each marker
#                    renders as a live shields.io badge in place of `breakdown`.
#                    Keys: unit, integration, smoke, slow.

mature:
  - name: PROTEUS
    owner: FormingWorlds
    repo: PROTEUS
    workflow: ci-pr-checks.yml
    ci_label: CI
    has_codecov: true
    total_endpoint: tests-total.json
    badge_branch: badges
    markers:
      unit: tests-unit.json
      integration: tests-integration.json

