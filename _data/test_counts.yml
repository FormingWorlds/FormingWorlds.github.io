# Test count and badge data for the /testing page.
#
# Each entry is rendered as one row in either the "mature" or "in_development"
# table by _pages/testing.md.
#
# Per-row fields:
#   name           Display name
#   owner          GitHub owner
#   repo           GitHub repo
#   workflow       Filename of the primary test workflow (for the CI badge)
#   ci_label       Text shown on the CI badge ("CI" or "tests")
#   has_codecov    Whether to render a Codecov coverage badge
#   total          Static total test count (text or number). Shown when no
#                    `total_endpoint` is provided.
#   total_endpoint Optional. Path of the shields.io-compatible JSON file,
#                    relative to `badge_branch` (e.g. "tests-total.json" at the
#                    root of a badges branch, or ".github/badges/tests-total.json"
#                    on main). When set, the row renders a live shields.io
#                    endpoint badge instead of the static `total`.
#   badge_branch   Optional. Branch that holds the badge JSON files. Defaults
#                    to "main". Repos with a protected main publish the JSON to
#                    a dedicated "badges" branch instead; set this to that
#                    branch name so the endpoint URLs resolve. Applies to
#                    `total_endpoint` and `markers` only, not the CI/coverage
#                    badges (those always track main).
#   breakdown      Optional. Plain-text marker breakdown ("816 unit, ...").
#                    Used until per-marker endpoint files are published.
#   markers        Optional. Map of marker name to JSON path (relative to
#                    `badge_branch`); when set, each marker renders as a live
#                    shields.io badge in place of `breakdown`. Keys: unit,
#                    integration, smoke, slow.

mature:
  - name: PROTEUS
    owner: FormingWorlds
    repo: PROTEUS
    workflow: ci-pr-checks.yml
    ci_label: CI
    has_codecov: true
    total_endpoint: tests-total.json
    badge_branch: badges
    markers:
      unit: tests-unit.json
      integration: tests-integration.json

