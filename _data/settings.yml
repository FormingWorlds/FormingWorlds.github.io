basic_settings:
  site_title: PROTEUS Framework
  favicon_light: /assets/img/brand/PROTEUS_black_on_white_logo_only.png
  favicon_dark: /assets/img/brand/PROTEUS_white_on_black_logo_only.png

header_settings:
  logo_image: /assets/img/brand/PROTEUS_white_on_black.png
  mobile_logo_image: /assets/img/brand/PROTEUS_white_on_black.png
  # Choose a color for your header [blue, dark, light].
  theme: dark
  # If the page has a featured image, it turns transparent if allow_transparent is set to "yes".
  allow_transparent: "yes"

home_settings:
  # Choose a layout for your home page:
    # landing - an example landing page made using the Argon design system
    # papers - use your papers as the home page
  theme: landing

blog_settings:
  # Choose a format for your papers listings:
    # basic - a simple list of papers
    # narrow - a masonary grid of papers
    # grid - a full-width square grid of papers
  theme: basic
  # Should we display a narrow grid of other papers at the bottom of each paper?
  read_more: "yes"

menu_settings:
  menu_items:
    - title: 'Home'
      url: '/'

    - title: 'Documentation'
      submenu_items:
      - title: PROTEUS
        url: https://proteus-framework.org/PROTEUS/
