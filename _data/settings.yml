      - title: Modules
        url: /modules
        icon: ni-bold-right text-primary

    - title: 'Demos'
      url: '/demos'

    - title: 'Publications'
      url: 'https://scixplorer.org/public-libraries/EVAJ1UgWTCy2Z7TRoSmjtQ'

    - title: 'People & Contact'
      url: '/people'

