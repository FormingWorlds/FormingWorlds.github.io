# Test count and badge data for the /testing page.
#
# Each entry is rendered as one row in either the "mature" or "in_development"
# table by _pages/testing.md.
#
# Per-row fields:
#   name           Display name
#   owner          GitHub owner
#   repo           GitHub repo
#   workflow       Filename of the primary test workflow (for the CI badge)
#   ci_label       Text shown on the CI badge ("CI" or "tests")
#   has_codecov    Whether to render a Codecov coverage badge
#   total          Static total test count (text or number). Shown when no
#                    `total_endpoint` is provided.
#   total_endpoint Optional. Path of the shields.io-compatible JSON file on
#                    main (e.g. ".github/badges/tests-total.json"). When set,
#                    the row renders a live shields.io endpoint badge instead
#                    of the static `total`.
#   breakdown      Optional. Plain-text marker breakdown ("816 unit, ...").
#                    Used until per-marker endpoint files are published.
#   markers        Optional. Map of marker name to JSON path on main; when set,
#                    each marker renders as a live shields.io badge in place
#                    of `breakdown`. Keys: unit, integration, smoke, slow.

