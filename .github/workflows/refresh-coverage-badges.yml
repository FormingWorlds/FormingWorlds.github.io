name: Refresh coverage badges

# Reads each module's Codecov line coverage once a day and publishes it as a
# shields.io endpoint JSON on the dedicated `badges` branch. The validation page
# renders those JSON files by raw URL, so the coverage figures never depend on
# Codecov being reachable when a visitor loads the page. The badges branch
# holds only these generated files; the site source lives on main.

on:
  schedule:
    - cron: '17 6 * * *'
  push:
    branches: [main]
    paths:
      - data/test_counts.yml
      - .github/scripts/refresh_coverage_badges.py
      - .github/workflows/refresh-coverage-badges.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: coverage-badges
  cancel-in-progress: false

jobs:
  refresh:
    name: Publish coverage endpoint JSON
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate and publish coverage badges
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          branch="badges"
          work="$(mktemp -d)"

          # Start the publish tree from the current badges branch when it
          # exists, so any module whose Codecov query fails this run keeps the
          # value published last time instead of losing its badge.
          git init -q "${work}"
          if git ls-remote --exit-code --heads "${remote}" "${branch}" >/dev/null 2>&1; then
            git -C "${work}" fetch -q "${remote}" "${branch}"
            git -C "${work}" checkout -q FETCH_HEAD
          fi

          python "${GITHUB_WORKSPACE}/.github/scripts/refresh_coverage_badges.py" \
            --data "${GITHUB_WORKSPACE}/data/test_counts.yml" \
            --out "${work}"

          printf '%s\n' \
            '# Coverage badges' \
            '' \
            'Machine-generated by the `Refresh coverage badges` workflow on `main`.' \
            'Each `coverage-<repo>.json` is a shields.io endpoint badge holding a' \
            "module's Codecov line coverage. The validation page reads these by raw URL." \
            'Do not edit or delete this branch by hand; the site source lives on `main`.' \
            > "${work}/README.md"

          cd "${work}"
          git add -A
          if git rev-parse --verify -q HEAD >/dev/null && git diff --cached --quiet; then
            echo "Coverage badges unchanged; nothing to publish."
            exit 0
          fi

          git -c user.name="actions" -c user.email="actions@github.com" \
            commit -qm "Update coverage badges [skip ci]"
          git push -q "${remote}" "HEAD:refs/heads/${branch}"
          echo "Published coverage badges to the ${branch} branch."
